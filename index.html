<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dashboard">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Dashboard</title>

  <!-- ✅ Fonts (CORRECTLY DECLARED) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0d0d0d;
  color: #ffffff;
  font-family: Inter, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px;
}

/* CLOCK */
.clock {
  display: flex;
  margin-bottom: 14px;
}

.flip {
  width: 72px;
  height: 110px;
  margin: 0 4px;
  background: #111;
  border-radius: 8px;
  border: 1px solid #2a2a2a;
  font-family: 'Share Tech Mono', monospace;
  font-size: 76px;
  text-align: center;
  line-height: 110px;
  position: relative;
}

.flip span { position: absolute; inset: 0; }

.flip:after {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: #333;
}

.date {
  color: #999;
  font-size: 0.9rem;
  letter-spacing: 0.14em;
  margin-bottom: 28px;
}

/* CARDS */
.cards {
  max-width: 900px;
  width: 100%;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  flex: 1 1 300px;
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  padding: 24px;
}

.card-title {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: #888;
  margin-bottom: 18px;
}

/* WEATHER */
.temp {
  font-size: 3.2rem;
  font-family: 'Share Tech Mono', monospace;
}

.week {
  margin-top: 18px;
  display: flex;
  justify-content: space-between;
}

.day {
  text-align: center;
  font-size: 0.75rem;
  color: #aaa;
}

.day strong {
  display: block;
  color: #fff;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  font-size: 0.75rem;
}

.calendar .dow {
  color: #666;
  font-weight: bold;
}

.today {
  background: #4a9eff;
  border-radius: 6px;
}

/* MOBILE */
@media (max-width: 500px) {
  .flip {
    width: 52px;
    height: 80px;
    line-height: 80px;
    font-size: 52px;
  }
}
</style>
</head>

<body>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="cards">
  <div class="card">
    <div class="card-title">JOHANNESBURG</div>
    <div class="temp" id="temp">--°</div>
    <div id="desc">Loading</div>
    <div class="week" id="week"></div>
  </div>

  <div class="card">
    <div class="card-title">CALENDAR</div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<script>
var DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June',
              'July','August','September','October','November','December'];

/* CLOCK */
function buildClock() {
  var c = document.getElementById('clock');
  c.innerHTML = '';
  for (var i = 0; i < 8; i++) {
    var d = document.createElement('div');
    d.className = 'flip';
    d.innerHTML = '<span>0</span>';
    c.appendChild(d);
  }
}

function updateClock() {
  var now = new Date();
  var t = now.toTimeString().slice(0, 8);
  var spans = document.querySelectorAll('.flip span');
  for (var i = 0; i < spans.length; i++) {
    spans[i].textContent = t[i] || '';
  }
  document.getElementById('date').textContent =
    DAYS_FULL[now.getDay()] + ', ' +
    now.getDate() + ' ' +
    MONTHS[now.getMonth()] + ' ' +
    now.getFullYear();
}

buildClock();
updateClock();
setInterval(updateClock, 1000);

/* WEATHER – XHR */
function getJSON(url, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4 && xhr.status === 200) {
      callback(JSON.parse(xhr.responseText));
    }
  };
  xhr.send();
}

function loadWeather() {
  getJSON(
    'https://api.open-meteo.com/v1/forecast?' +
    'latitude=-26.2041&longitude=28.0473' +
    '&current=temperature_2m' +
    '&daily=temperature_2m_max' +
    '&timezone=Africa/Johannesburg',
    function (data) {
      document.getElementById('temp').textContent =
        Math.round(data.current.temperature_2m) + '°C';
      document.getElementById('desc').textContent = 'Today';

      var w = document.getElementById('week');
      w.innerHTML = '';
      for (var i = 1; i < 7; i++) {
        var d = document.createElement('div');
        d.className = 'day';
        d.innerHTML =
          DAYS_SHORT[new Date(data.daily.time[i]).getDay()] +
          '<strong>' + Math.round(data.daily.temperature_2m_max[i]) + '°</strong>';
        w.appendChild(d);
      }
    }
  );
}

loadWeather();

/* CALENDAR */
function buildCalendar() {
  var cal = document.getElementById('calendar');
  cal.innerHTML = '';
  var now = new Date();
  var first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  var days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

  for (var i = 0; i < 7; i++) {
    var h = document.createElement('div');
    h.className = 'dow';
    h.textContent = DAYS_SHORT[i];
    cal.appendChild(h);
  }

  for (i = 0; i < first; i++) cal.appendChild(document.createElement('div'));

  for (i = 1; i <= days; i++) {
    var d = document.createElement('div');
    d.textContent = i;
    if (i === now.getDate()) d.className = 'today';
    cal.appendChild(d);
  }
}

buildCalendar();
</script>

</body>
</html>
