<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#0d0d0d;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* LAYOUT */
.app {
  position:absolute;
  /* FIXED: Removed 'inset: 8px;' which is unsupported in iOS 9 */
  top: 8px;
  right: 8px;
  bottom: 8px;
  left: 8px;
}

/* CLOCK */
.clock-wrap {
  text-align:center;
  margin-bottom:8px;
}

.clock {
  font-size:64px;
  font-family:monospace;
}

.date {
  font-size:14px;
  color:#888;
}

/* CARDS */
.cards {
  position:absolute;
  top:110px;
  bottom:0;
  left:0;
  right:0;
}

.card {
  display:inline-block;
  width:50%;
  height:100%;
  padding:6px;
}

.card-inner {
  height:100%;
  background:#161616;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:10px;
}

.title {
  font-size:11px;
  color:#888;
  margin-bottom:10px;
}

/* WEATHER */
.temp {
  font-size:36px;
}

.week { font-size:0; }

.day {
  display:inline-block;
  width:14.285%;
  text-align:center;
  font-size:11px;
}

/* CALENDAR */
.cal { font-size:0; }

.cal div {
  display:inline-block;
  width:14.285%;
  text-align:center;
  font-size:12px;
  padding:4px 0;
}

.today {
  background:#4a9eff;
}
</style>
</head>

<body>

<div class="app">

<div class="clock-wrap">
  <div id="clock" class="clock"></div>
  <div id="date" class="date"></div>
</div>

<div class="cards">

  <div class="card">
    <div class="card-inner">
      <div class="title">Johannesburg</div>
      <div id="temp" class="temp">--°</div>
      <div id="desc">Loading...</div>
      <div id="week" class="week"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div id="month" class="title"></div>
      <div id="calendar" class="cal"></div>
    </div>
  </div>

</div>

</div>

<script>
/* CLOCK */
function pad(n){return n<10?'0'+n:n;}

function updateClock(){
  var n=new Date();
  var time=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());

  document.getElementById('clock').innerHTML=time;

  document.getElementById('date').innerHTML =
    ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n.getDay()]
    + ', ' + n.getDate() + ' ' +
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][n.getMonth()];
}

/* CALENDAR */
function buildCalendar(){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth(),d=n.getDate();
  var cal=document.getElementById('calendar');

  document.getElementById('month').innerHTML =
    ['January','February','March','April','May','June','July','August','September','October','November','December'][m]+' '+y;

  cal.innerHTML='';

  var dow=['Su','Mo','Tu','We','Th','Fr','Sa'];
  for(var i=0;i<7;i++) cal.innerHTML+='<div>'+dow[i]+'</div>';

  for(i=0;i<new Date(y,m,1).getDay();i++) cal.innerHTML+='<div></div>';

  for(i=1;i<=new Date(y,m+1,0).getDate();i++){
    cal.innerHTML+='<div'+(i===d?' class="today"':'')+'>'+i+'</div>';
  }
}

/* WEATHER */
function loadWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude=-26.2041&longitude=28.0473&current=temperature_2m&daily=temperature_2m_max&forecast_days=7';

  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);

  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;

    if(xhr.status===200){
      try{
        var data=JSON.parse(xhr.responseText);

        document.getElementById('temp').innerHTML =
          Math.round(data.current.temperature_2m)+'°C';

        document.getElementById('desc').innerHTML='Live';

        var w=document.getElementById('week');
        w.innerHTML='';

        var days=['Su','Mo','Tu','We','Th','Fr','Sa'];

        for(var i=0;i<7;i++){
          // FIXED: Manual date splitting for Safari 9 compatibility
          var dateString = data.daily.time[i]; // "YYYY-MM-DD"
          var dateParts = dateString.split('-');
          var d = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
          
          w.innerHTML+='<div class="day">'+days[d.getDay()]+'<br>'+data.daily.temperature_2m_max[i]+'°</div>';
        }

      }catch(e){}
    }
  };

  xhr.send(null);
}

/* INIT */
updateClock();
buildCalendar();
loadWeather();

setInterval(updateClock,1000);
</script>

</body>
</html>
