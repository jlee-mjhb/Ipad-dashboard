=<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="format-detection" content="telephone=no">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#14141a;color:#ece6d8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
.app{position:absolute;top:14px;right:14px;bottom:14px;left:14px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;}
.card{background:#1b1b22;border:1px solid #2a2a32;border-radius:4px;}
.top-row{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-direction:row;flex-direction:row;-webkit-flex:0 0 60%;flex:0 0 60%;min-height:0;margin-bottom:10px;}
.bottom-row{-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-direction:row;flex-direction:row;min-height:0;}
.clock-card{-webkit-flex:1.15;flex:1.15;margin-right:5px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center;padding:18px 24px;}
.time-row{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:end;-webkit-align-items:flex-end;align-items:flex-end;}
.time-part{display:inline-block;font-size:200px;line-height:0.85;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#ece6d8;letter-spacing:-6px;text-align:center;}
.time-sep{font-size:190px;line-height:0.85;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#3e3a33;margin:0 6px;-webkit-animation:blink 1s step-end infinite;animation:blink 1s step-end infinite;}
.sec-part{font-size:54px;line-height:1;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:200;color:#7a766e;letter-spacing:-1px;margin-left:20px;margin-bottom:24px;-webkit-align-self:flex-end;align-self:flex-end;}
.clock-date{margin-top:18px;font-size:32px;line-height:1;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;color:#ece6d8;letter-spacing:0.5px;text-align:center;}
.clock-date .day{color:#d6a874;font-weight:500;}
.clock-foot{margin-top:12px;font-size:14px;letter-spacing:2.5px;text-transform:uppercase;color:#6e695e;font-weight:600;}
.clock-foot strong{color:#b9b2a3;font-weight:600;letter-spacing:1px;}
.clock-foot .sep{color:#3e3a33;margin:0 10px;}
@-webkit-keyframes blink{0%,100%{opacity:1;}50%{opacity:0.18;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.18;}}
.info-card{-webkit-flex:1;flex:1;margin-left:5px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center;padding:18px 22px;overflow:hidden;}
.info-eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#7a7468;font-weight:600;margin-bottom:10px;-webkit-flex-shrink:0;flex-shrink:0;}
.info-eyebrow .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#d6a874;margin:0 9px 2px 0;vertical-align:middle;}
.wx-hero{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-flex-shrink:0;flex-shrink:0;}
.wx-icon{font-size:64px;line-height:1;margin-right:20px;}
.wx-temp{font-size:96px;line-height:0.9;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#ece6d8;letter-spacing:-3px;}
.wx-temp .deg{color:#7a766e;font-size:48px;vertical-align:top;margin-left:2px;}
.wx-meta{text-align:center;line-height:1.35;margin-top:6px;-webkit-flex-shrink:0;flex-shrink:0;}
.wx-desc{font-size:20px;color:#ece6d8;font-weight:400;}
.wx-detail{font-size:14px;color:#7a7468;letter-spacing:0.5px;margin-top:4px;}
.wx-week{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-direction:row;flex-direction:row;width:100%;margin-top:16px;border-top:1px solid #20202a;border-bottom:1px solid #20202a;padding:10px 0;-webkit-flex-shrink:0;flex-shrink:0;}
.wx-day{-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-align:center;-webkit-align-items:center;align-items:center;padding:2px 0;position:relative;}
.wx-day+.wx-day{border-left:1px solid #20202a;}
.wx-day-name{font-size:11px;color:#7a7468;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:700;}
.wx-day.wx-today .wx-day-name{color:#d6a874;}
.wx-day-icon{font-size:24px;line-height:1;margin-bottom:6px;}
.wx-day-hi{font-size:16px;font-weight:600;color:#ece6d8;}
.wx-day-lo{font-size:13px;color:#7a7468;margin-top:2px;}
.sw-al-card{-webkit-flex:1;flex:1;margin-right:5px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;overflow:hidden;}
.sw-al-tabs{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-shrink:0;flex-shrink:0;border-bottom:1px solid #2a2a32;}
.sw-al-tab{-webkit-flex:1;flex:1;background:transparent;border:0;border-bottom:2px solid transparent;color:#7a7468;font-size:13px;font-weight:600;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:16px 8px;cursor:pointer;letter-spacing:2.5px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.sw-al-tab.active{color:#ece6d8;border-bottom-color:#d6a874;}
.sw-al-body{-webkit-flex:1;flex:1;min-height:0;overflow:hidden;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center;padding:16px;}
.sw-display{font-size:96px;line-height:0.9;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#ece6d8;letter-spacing:-2px;margin-bottom:28px;}
.btn-row{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;}
.btn{background:transparent;border:1px solid #2a2a32;border-radius:2px;color:#ece6d8;font-size:13px;font-weight:600;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:14px 32px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;margin:0 6px;}
.btn-primary{background:#d6a874;border-color:#d6a874;color:#1b1b22;}
.btn-stop{background:transparent;border-color:#c97a6b;color:#c97a6b;}
.btn-ghost{background:transparent;border-color:#2a2a32;color:#7a7468;}
.alarm-status{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:#7a7468;margin-bottom:20px;min-height:16px;text-align:center;font-weight:600;}
.alarm-status strong{color:#ece6d8;font-weight:600;letter-spacing:0;text-transform:none;font-size:18px;}
.alarm-active{color:#d6a874;}
.alarm-controls{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:22px;}
.al-group{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-align:center;-webkit-align-items:center;align-items:center;}
.al-label{font-size:11px;color:#5a554c;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.al-val{font-size:76px;line-height:1;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#ece6d8;letter-spacing:-2px;width:110px;text-align:center;margin:6px 0;}
.al-colon{font-size:76px;line-height:1;font-family:'HelveticaNeue-UltraLight','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:100;color:#3e3a33;margin:0 6px;padding-top:24px;}
.btn-sm{background:transparent;border:1px solid #2a2a32;border-radius:2px;color:#b9b2a3;font-size:22px;font-weight:300;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;padding:7px 0;cursor:pointer;line-height:1;display:block;width:110px;text-align:center;-webkit-tap-highlight-color:transparent;}
.btn-sm:active{background:#2a2a32;}
@-webkit-keyframes ring{0%,100%{-webkit-transform:translateX(0);}15%{-webkit-transform:translateX(-7px);}30%{-webkit-transform:translateX(7px);}45%{-webkit-transform:translateX(-5px);}60%{-webkit-transform:translateX(5px);}75%{-webkit-transform:translateX(-3px);}90%{-webkit-transform:translateX(3px);}}
@keyframes ring{0%,100%{transform:translateX(0);}15%{transform:translateX(-7px);}30%{transform:translateX(7px);}45%{transform:translateX(-5px);}60%{transform:translateX(5px);}75%{transform:translateX(-3px);}90%{transform:translateX(3px);}}
.ringing{color:#d6a874!important;-webkit-animation:ring 0.6s ease-in-out 4;animation:ring 0.6s ease-in-out 4;}
.cal-card{-webkit-flex:1;flex:1;margin-left:5px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;padding:16px 18px;overflow:hidden;}
.cal-head{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:baseline;-webkit-align-items:baseline;align-items:baseline;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #20202a;-webkit-flex-shrink:0;flex-shrink:0;}
.cal-month{font-size:24px;color:#ece6d8;font-weight:300;letter-spacing:0.5px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
.cal-month .yr{color:#7a7468;margin-left:8px;}
.cal-tag{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#5a554c;font-weight:600;}
.cal{font-size:0;-webkit-flex-shrink:0;flex-shrink:0;}
.cal>div{display:inline-block;width:14.285%;text-align:center;font-size:17px;padding:9px 0;color:#b9b2a3;vertical-align:top;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;position:relative;}
.cal-header div{color:#5a554c;font-size:11px;font-weight:700;padding-bottom:8px;text-transform:uppercase;letter-spacing:2px;}
.today{color:#d6a874!important;font-weight:600;}
.today::before{content:'';position:absolute;top:4px;left:50%;margin-left:-18px;width:36px;height:36px;border:1.5px solid #d6a874;border-radius:50%;}
.holiday::after{content:'';position:absolute;bottom:3px;left:50%;margin-left:-2px;width:4px;height:4px;border-radius:50%;background:#c97a6b;}
.holiday{color:#d3a097!important;}
.today.holiday::before{border-color:#c97a6b;}
.today.holiday{color:#c97a6b!important;}
.empty{visibility:hidden;}
.cal-foot{-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-pack:end;-webkit-justify-content:flex-end;justify-content:flex-end;-webkit-flex-shrink:0;flex-shrink:0;padding-top:10px;text-align:center;}
.holiday-name{font-size:16px;color:#b9b2a3;text-align:center;line-height:1.35;min-height:18px;}
.holiday-name .lbl{display:block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#5a554c;font-weight:700;margin-bottom:5px;}
.holiday-name strong{color:#ece6d8;font-weight:600;}
.holiday-name .days{color:#d6a874;font-weight:600;}
.holiday-name.hol-today .lbl{color:#d6a874;}
.holiday-name.hol-today{color:#ece6d8;}
@media screen and (max-height:820px){.time-part{font-size:170px;letter-spacing:-5px;}.time-sep{font-size:160px;}.sec-part{font-size:46px;margin-bottom:20px;}.clock-date{font-size:28px;margin-top:14px;}.clock-foot{font-size:13px;margin-top:10px;letter-spacing:2px;}.info-card{padding:14px 22px;}.info-eyebrow{font-size:11px;margin-bottom:8px;}.wx-icon{font-size:56px;margin-right:18px;}.wx-temp{font-size:84px;}.wx-temp .deg{font-size:42px;}.wx-desc{font-size:18px;}.wx-detail{font-size:13px;}.wx-week{margin-top:12px;padding:8px 0;}.wx-day-icon{font-size:22px;}.wx-day-hi{font-size:15px;}.wx-day-lo{font-size:12px;}.wx-day-name{font-size:10px;}.sw-display{font-size:80px;margin-bottom:22px;}.sw-al-tab{padding:13px 8px;font-size:12px;}.btn{font-size:12px;padding:12px 28px;}.alarm-status{font-size:12px;margin-bottom:16px;}.alarm-status strong{font-size:16px;}.al-val,.al-colon{font-size:64px;}.al-colon{padding-top:20px;}.btn-sm,.al-val{width:96px;}.btn-sm{font-size:20px;padding:6px 0;}.cal-card{padding:10px 16px 8px;}.cal-head{margin-bottom:5px;padding-bottom:5px;}.cal-month{font-size:19px;}.cal>div{font-size:14px;padding:3px 0;}.cal-header div{font-size:10px;padding-bottom:4px;}.today::before{top:0;width:24px;height:24px;margin-left:-12px;}.cal-foot{padding-top:4px;}.holiday-name{font-size:13px;min-height:0;}.holiday-name .lbl{font-size:9px;margin-bottom:2px;}}
@media screen and (max-height:680px){.time-part{font-size:140px;letter-spacing:-4px;}.time-sep{font-size:130px;}.sec-part{font-size:38px;margin-bottom:16px;}.clock-card{padding:12px 18px;}.clock-date{font-size:24px;margin-top:10px;}.wx-temp{font-size:66px;}.wx-temp .deg{font-size:34px;}.wx-icon{font-size:46px;margin-right:14px;}.sw-display{font-size:64px;margin-bottom:18px;}.al-val,.al-colon{font-size:52px;}.btn-sm,.al-val{width:82px;}.cal>div{font-size:13px;padding:5px 0;}.today::before{top:2px;width:26px;height:26px;margin-left:-13px;}}
@media screen and (max-width:760px){.app{top:8px;right:8px;bottom:8px;left:8px;}.top-row{-webkit-flex-direction:column;flex-direction:column;-webkit-flex:0 0 auto;flex:0 0 auto;}.bottom-row{-webkit-flex:1;flex:1;-webkit-flex-direction:column;flex-direction:column;}.clock-card,.sw-al-card{margin-right:0;margin-bottom:6px;}.info-card,.cal-card{margin-left:0;margin-top:6px;}.time-part{font-size:104px;letter-spacing:-3px;}.time-sep{font-size:96px;}.sec-part{font-size:30px;margin-bottom:10px;}.clock-date{font-size:22px;margin-top:10px;}.wx-temp{font-size:56px;}.wx-temp .deg{font-size:30px;}.sw-display{font-size:54px;}}
</style>
</head>
<body>
<div class="app">
<div class="top-row">
<div class="card clock-card">
<div class="time-row">
<div class="time-part" id="hours">--</div>
<div class="time-sep">:</div>
<div class="time-part" id="minutes">--</div>
<div class="sec-part" id="seconds">00</div>
</div>
<div class="clock-date" id="clock-date"><span class="day">&mdash;</span>, &mdash;</div>
<div class="clock-foot">Seoul KST &nbsp;<strong id="tz-seoul">--:--</strong><span id="tz-seoul-day"></span></div>
</div>
<div class="card info-card">
<div class="info-eyebrow"><span class="dot"></span>Johannesburg</div>
<div class="wx-hero">
<span class="wx-icon" id="wx-icon">&#9729;</span>
<span class="wx-temp" id="wx-temp">--<span class="deg">&deg;</span></span>
</div>
<div class="wx-meta">
<div class="wx-desc" id="wx-desc">Loading&hellip;</div>
<div class="wx-detail" id="wx-detail">&mdash;</div>
</div>
<div class="wx-week" id="wx-week"></div>
</div>
</div>
<div class="bottom-row">
<div class="card sw-al-card">
<div class="sw-al-tabs">
<button class="sw-al-tab active" id="btn-sw" onclick="showSwAl('sw')">Stopwatch</button>
<button class="sw-al-tab" id="btn-al" onclick="showSwAl('al')">Alarm</button>
</div>
<div class="sw-al-body">
<div id="panel-sw">
<div class="sw-display" id="sw-display">00:00.0</div>
<div class="btn-row">
<button class="btn btn-primary" id="sw-start" onclick="swStartStop()">Start</button>
<button class="btn btn-ghost" onclick="swReset()">Reset</button>
</div>
</div>
<div id="panel-al" style="display:none;">
<div class="alarm-status" id="al-status">No alarm set</div>
<div class="alarm-controls">
<div class="al-group">
<div class="al-label">Hour</div>
<button class="btn-sm" onclick="alAdj('h',1)">+</button>
<div class="al-val" id="al-h">07</div>
<button class="btn-sm" onclick="alAdj('h',-1)">&minus;</button>
</div>
<div class="al-colon">:</div>
<div class="al-group">
<div class="al-label">Min</div>
<button class="btn-sm" onclick="alAdj('m',1)">+</button>
<div class="al-val" id="al-m">00</div>
<button class="btn-sm" onclick="alAdj('m',-1)">&minus;</button>
</div>
</div>
<button class="btn btn-primary" id="al-set-btn" onclick="alToggle()">Set Alarm</button>
</div>
</div>
</div>
<div class="card cal-card">
<div class="cal-head">
<div class="cal-month" id="cal-month">&mdash;</div>
<div class="cal-tag">Public Holidays &middot; ZA</div>
</div>
<div class="cal cal-header"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
<div id="calendar" class="cal"></div>
<div class="cal-foot"><div id="hol-countdown" class="holiday-name">&nbsp;</div></div>
</div>
</div>
</div>
<script>
function pad(n){return n<10?'0'+n:''+n;}
function showSwAl(name){var tabs=['sw','al'],i;for(i=0;i<tabs.length;i++){document.getElementById('panel-'+tabs[i]).style.display=(tabs[i]===name)?'':'none';document.getElementById('btn-'+tabs[i]).className='sw-al-tab'+(tabs[i]===name?' active':'');}unlockAudio();}
function updateSeoul(){var now=new Date();var kst=new Date(now.getTime()+(now.getTimezoneOffset()*60000)+(9*3600000));document.getElementById('tz-seoul').textContent=pad(kst.getHours())+':'+pad(kst.getMinutes());var diff=kst.getDate()-now.getDate();document.getElementById('tz-seoul-day').textContent=(diff>0)?' (+1d)':(diff<0)?' (-1d)':'';}
function getEaster(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,ii=Math.floor(c/4),k=c%4,l=(32+2*e+2*ii-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,dy);}
function getSAHolidays(y){var hols={},i,dt,key,mon,fixed=[[1,1,"New Year's Day"],[3,21,'Human Rights Day'],[4,27,'Freedom Day'],[5,1,"Workers' Day"],[6,16,'Youth Day'],[8,9,"National Women's Day"],[9,24,'Heritage Day'],[12,16,'Day of Reconciliation'],[12,25,'Christmas Day'],[12,26,'Day of Goodwill']];for(i=0;i<fixed.length;i++){dt=new Date(y,fixed[i][0]-1,fixed[i][1]);key=pad(dt.getMonth()+1)+'-'+pad(dt.getDate());hols[key]=fixed[i][2];if(dt.getDay()===0){mon=new Date(y,dt.getMonth(),dt.getDate()+1);hols[pad(mon.getMonth()+1)+'-'+pad(mon.getDate())]=fixed[i][2]+' (obs)';}}var e=getEaster(y),gf=new Date(y,e.getMonth(),e.getDate()-2),fd=new Date(y,e.getMonth(),e.getDate()+1);hols[pad(gf.getMonth()+1)+'-'+pad(gf.getDate())]='Good Friday';hols[pad(fd.getMonth()+1)+'-'+pad(fd.getDate())]='Family Day';return hols;}
function updateHolCountdown(){var today=new Date(),y=today.getFullYear(),m=today.getMonth(),d=today.getDate(),todayKey=pad(m+1)+'-'+pad(d),todayMs=new Date(y,m,d).getTime(),hols=getSAHolidays(y),bestDays=9999,name='',found=false,key,parts,dt,days,el=document.getElementById('hol-countdown');if(hols[todayKey]){el.innerHTML='<span class="lbl">Today · Public Holiday</span><strong>'+hols[todayKey]+'</strong>';el.className='holiday-name hol-today';return;}for(key in hols){parts=key.split('-');dt=new Date(y,parseInt(parts[0],10)-1,parseInt(parts[1],10));days=Math.round((dt.getTime()-todayMs)/86400000);if(days>0&&days<bestDays){bestDays=days;name=hols[key];found=true;}}if(!found){hols=getSAHolidays(y+1);for(key in hols){parts=key.split('-');dt=new Date(y+1,parseInt(parts[0],10)-1,parseInt(parts[1],10));days=Math.round((dt.getTime()-todayMs)/86400000);if(days>0&&days<bestDays){bestDays=days;name=hols[key];found=true;}}}if(found){el.innerHTML='<span class="lbl">Next holiday</span><strong>'+name+'</strong> · in <span class="days">'+bestDays+' day'+(bestDays===1?'':'s')+'</span>';el.className='holiday-name';}else{el.innerHTML='&nbsp;';el.className='holiday-name';}}
var _lastDay=-1;
function updateClock(){var n=new Date();document.getElementById('hours').textContent=pad(n.getHours());document.getElementById('minutes').textContent=pad(n.getMinutes());document.getElementById('seconds').textContent=pad(n.getSeconds());var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('clock-date').innerHTML='<span class="day">'+DAYS[n.getDay()]+'</span>, '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();if(_lastDay!==-1&&_lastDay!==n.getDate()){buildCalendar();updateHolCountdown();fetchWeather();}_lastDay=n.getDate();updateSeoul();checkAlarm(n);}
function buildCalendar(){var n=new Date(),y=n.getFullYear(),m=n.getMonth(),d=n.getDate(),MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('cal-month').innerHTML=MONTHS[m]+'<span class="yr">'+y+'</span>';var hols=getSAHolidays(y),cal=document.getElementById('calendar');cal.innerHTML='';var firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate(),i,div,key,cls;for(i=0;i<firstDay;i++){div=document.createElement('div');div.className='empty';div.textContent='.';cal.appendChild(div);}for(i=1;i<=daysInMonth;i++){div=document.createElement('div');key=pad(m+1)+'-'+pad(i);cls=(i===d)?'today':'';if(hols[key]){cls+=(cls?' ':'')+'holiday';}div.className=cls;div.textContent=i;cal.appendChild(div);}}
function getWeatherIcon(code){if(code===0)return'☀️';if(code<=3)return'⛅';if(code<=48)return'☁️';if(code<=67)return'☔';if(code<=77)return'❄️';if(code<=82)return'☔';if(code<=86)return'❄️';return'⚡';}
function getWeatherDesc(code){if(code===0)return'Clear sky';if(code<=3)return'Partly cloudy';if(code<=48)return'Foggy';if(code<=55)return'Drizzle';if(code<=67)return'Rainy';if(code<=77)return'Snow';if(code<=82)return'Showers';if(code<=86)return'Snow showers';return'Thunderstorm';}
function windDirFromDeg(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round((d||0)/45)%8];}
var URL_CURRENT='https://api.open-meteo.com/v1/forecast?latitude=-26.2041&longitude=28.0473&current_weather=true&temperature_unit=celsius';
var _cScript=null,_cTimer=null;
function applyCurrentWeather(w){document.getElementById('wx-icon').innerHTML=getWeatherIcon(w.weathercode);document.getElementById('wx-temp').innerHTML=Math.round(w.temperature)+'<span class="deg">°</span>';document.getElementById('wx-desc').innerText=getWeatherDesc(w.weathercode);document.getElementById('wx-detail').innerText=Math.round(w.windspeed)+' km/h '+windDirFromDeg(w.winddirection);}
window.wxCurrentCB=function(wrapper){if(_cTimer){clearTimeout(_cTimer);_cTimer=null;}if(_cScript&&_cScript.parentNode){_cScript.parentNode.removeChild(_cScript);_cScript=null;}try{applyCurrentWeather(JSON.parse(wrapper.contents).current_weather);}catch(e){document.getElementById('wx-desc').innerText='Parse error';}}
function fetchCurrentViaProxy(){if(_cTimer){clearTimeout(_cTimer);}_cTimer=setTimeout(function(){if(_cScript&&_cScript.parentNode){_cScript.parentNode.removeChild(_cScript);_cScript=null;}document.getElementById('wx-desc').innerText='Unavailable';},12000);var s=document.createElement('script');s.type='text/javascript';s.src='https://api.allorigins.win/get?callback=wxCurrentCB&url='+encodeURIComponent(URL_CURRENT);s.onerror=function(){if(_cTimer){clearTimeout(_cTimer);_cTimer=null;}if(s.parentNode){s.parentNode.removeChild(s);}document.getElementById('wx-desc').innerText='Unavailable';};_cScript=s;document.head.appendChild(s);}
function fetchCurrent(){var done=false;var xhr=new XMLHttpRequest();xhr.open('GET',URL_CURRENT,true);xhr.timeout=8000;xhr.onreadystatechange=function(){if(xhr.readyState!==4||done)return;if(xhr.status===200){done=true;try{applyCurrentWeather(JSON.parse(xhr.responseText).current_weather);}catch(e){fetchCurrentViaProxy();}}else{done=true;fetchCurrentViaProxy();}};xhr.onerror=function(){if(!done){done=true;fetchCurrentViaProxy();}};xhr.ontimeout=function(){if(!done){done=true;fetchCurrentViaProxy();}};xhr.send();}
var URL_DAILY='https://api.open-meteo.com/v1/forecast?latitude=-26.2041&longitude=28.0473&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Africa/Johannesburg&temperature_unit=celsius&forecast_days=7';
var _dScript=null,_dTimer=null;
function buildWeekStrip(daily){var container=document.getElementById('wx-week');if(!container||!daily||!daily.time)return;container.innerHTML='';var DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];var max=daily.time.length<7?daily.time.length:7;for(var i=0;i<max;i++){var p=daily.time[i].split('-');var dn=DAY_NAMES[new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10)).getDay()];var cell=document.createElement('div');cell.className='wx-day'+(i===0?' wx-today':'');var ne=document.createElement('div');ne.className='wx-day-name';ne.innerText=(i===0?'Today':dn);var ie=document.createElement('div');ie.className='wx-day-icon';ie.innerHTML=getWeatherIcon(daily.weathercode[i]);var he=document.createElement('div');he.className='wx-day-hi';he.innerText=Math.round(daily.temperature_2m_max[i])+'°';var le=document.createElement('div');le.className='wx-day-lo';le.innerText=Math.round(daily.temperature_2m_min[i])+'°';cell.appendChild(ne);cell.appendChild(ie);cell.appendChild(he);cell.appendChild(le);container.appendChild(cell);}}
window.wxDailyCB=function(wrapper){if(_dTimer){clearTimeout(_dTimer);_dTimer=null;}if(_dScript&&_dScript.parentNode){_dScript.parentNode.removeChild(_dScript);_dScript=null;}try{buildWeekStrip(JSON.parse(wrapper.contents).daily);}catch(e){}}
function fetchDailyViaProxy(){if(_dTimer){clearTimeout(_dTimer);}_dTimer=setTimeout(function(){if(_dScript&&_dScript.parentNode){_dScript.parentNode.removeChild(_dScript);_dScript=null;}},12000);var s=document.createElement('script');s.type='text/javascript';s.src='https://api.allorigins.win/get?callback=wxDailyCB&url='+encodeURIComponent(URL_DAILY);s.onerror=function(){if(_dTimer){clearTimeout(_dTimer);_dTimer=null;}if(s.parentNode){s.parentNode.removeChild(s);}};_dScript=s;document.head.appendChild(s);}
function fetchDaily(){var done=false;var xhr=new XMLHttpRequest();xhr.open('GET',URL_DAILY,true);xhr.timeout=8000;xhr.onreadystatechange=function(){if(xhr.readyState!==4||done)return;if(xhr.status===200){done=true;try{buildWeekStrip(JSON.parse(xhr.responseText).daily);}catch(e){fetchDailyViaProxy();}}else{done=true;fetchDailyViaProxy();}};xhr.onerror=function(){if(!done){done=true;fetchDailyViaProxy();}};xhr.ontimeout=function(){if(!done){done=true;fetchDailyViaProxy();}};xhr.send();}
function fetchWeather(){fetchCurrent();fetchDaily();}
var swRunning=false,swStart=0,swElapsed=0,swTimer=null;
function swUpdate(){var e=swElapsed+(Date.now()-swStart),t=Math.floor(e/100);document.getElementById('sw-display').textContent=pad(Math.floor(t/600))+':'+pad(Math.floor(t/10)%60)+'.'+(t%10);}
function swStartStop(){unlockAudio();var btn=document.getElementById('sw-start');if(swRunning){swElapsed+=Date.now()-swStart;clearInterval(swTimer);swRunning=false;btn.textContent='Resume';btn.className='btn btn-primary';}else{swStart=Date.now();swTimer=setInterval(swUpdate,100);swRunning=true;btn.textContent='Pause';btn.className='btn btn-stop';}}
function swReset(){clearInterval(swTimer);swRunning=false;swElapsed=0;document.getElementById('sw-display').textContent='00:00.0';var btn=document.getElementById('sw-start');btn.textContent='Start';btn.className='btn btn-primary';}
var alH=7,alM=0,alActive=false,alFired=false;
var AudioCtx=window.webkitAudioContext||window.AudioContext||null;
var audioCtx=null;
function unlockAudio(){if(!AudioCtx||audioCtx)return;try{audioCtx=new AudioCtx();if(audioCtx.resume&&audioCtx.state==='suspended'){audioCtx.resume();}}catch(e){audioCtx=null;}}
function alAdj(part,delta){unlockAudio();if(part==='h'){alH=(alH+delta+24)%24;document.getElementById('al-h').textContent=pad(alH);}else{alM=(alM+delta+60)%60;document.getElementById('al-m').textContent=pad(alM);}}
function alToggle(){unlockAudio();var st=document.getElementById('al-status'),sb=document.getElementById('al-set-btn');if(alActive){alActive=false;alFired=false;st.textContent='No alarm set';st.className='alarm-status';sb.textContent='Set Alarm';sb.className='btn btn-primary';}else{alActive=true;alFired=false;st.innerHTML='Alarm set for <strong>'+pad(alH)+':'+pad(alM)+'</strong>';st.className='alarm-status alarm-active';sb.textContent='Cancel';sb.className='btn btn-stop';}}
function playBeep(){if(!audioCtx)return;var i,osc,gain,t,freqs=[880,1046,880];for(i=0;i<3;i++){try{osc=audioCtx.createOscillator();gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.type='sine';osc.frequency.value=freqs[i];t=audioCtx.currentTime+(i*0.55);gain.gain.setValueAtTime(0.4,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.45);osc.start(t);osc.stop(t+0.45);}catch(e){}}}
function checkAlarm(now){if(!alActive||alFired)return;if(now.getHours()===alH&&now.getMinutes()===alM){alFired=true;playBeep();var st=document.getElementById('al-status'),sb=document.getElementById('al-set-btn');st.innerHTML='&#128276; ALARM &nbsp;'+pad(alH)+':'+pad(alM);st.className='alarm-status alarm-active ringing';setTimeout(function(){alActive=false;alFired=false;st.textContent='No alarm set';st.className='alarm-status';sb.textContent='Set Alarm';sb.className='btn btn-primary';},90000);}}
function init(){updateClock();buildCalendar();updateHolCountdown();fetchWeather();setInterval(updateClock,1000);setInterval(fetchWeather,30*60*1000);}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
