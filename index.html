!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- iPad / iOS Web App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Dashboard">

<!-- Viewport -->
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0d0d0d;
  color: #ffffff;
  font-family: Inter, system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
  min-height: 100vh;
}

/* ───────────── CLOCK ───────────── */
.clock {
  display: flex;
  margin-bottom: 10px;
}

.flip {
  position: relative;
  width: 60px;
  height: 90px;
  margin: 0 2px;
  background: #111;
  border-radius: 6px;
  border: 1px solid #222;
  font-family: 'Share Tech Mono', monospace;
  font-size: 64px;
  text-align: center;
  line-height: 90px;
  overflow: hidden;
}

.flip span {
  position: absolute;
  inset: 0;
}

.flip::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: #333;
}

.date {
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: #999;
  margin-bottom: 24px;
}

/* ───────────── LAYOUT ───────────── */
.cards {
  width: 100%;
  max-width: 820px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.card {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 20px;
}

.card-title {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 16px;
}

/* ───────────── WEATHER ───────────── */
.temp {
  font-size: 3rem;
  font-family: 'Share Tech Mono', monospace;
}

.desc {
  color: #888;
  margin-top: 6px;
}

.week {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}

.day {
  text-align: center;
  font-size: 0.75rem;
  color: #aaa;
}

.day strong {
  display: block;
  margin-top: 4px;
  font-family: 'Share Tech Mono', monospace;
  color: #fff;
}

/* ───────────── CALENDAR ───────────── */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  font-size: 0.7rem;
  gap: 4px;
}

.calendar div {
  text-align: center;
  padding: 6px 0;
}

.calendar .dow {
  color: #666;
  font-weight: 600;
}

.today {
  background: #4a9eff;
  border-radius: 4px;
  color: #fff;
}

/* ───────────── MOBILE ───────────── */
@media (max-width: 500px) {
  .flip {
    width: 44px;
    height: 66px;
    font-size: 42px;
    line-height: 66px;
  }
}
</style>
</head>

<body>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="cards">

  <div class="card">
    <div class="card-title">Johannesburg</div>
    <div class="temp" id="temp">--°</div>
    <div class="desc" id="desc">Loading</div>
    <div class="week" id="week"></div>
  </div>

  <div class="card">
    <div class="card-title">Calendar</div>
    <div class="calendar" id="calendar"></div>
  </div>

</div>

<script>
const DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS     = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

/* ───────────── CLOCK ───────────── */
function buildClock() {
  const clock = document.getElementById('clock');
  clock.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'flip';
    el.innerHTML = '<span>0</span>';
    clock.appendChild(el);
  }
}

function updateClock() {
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  document.querySelectorAll('.flip span').forEach((el, i) => {
    el.textContent = time[i] || '';
  });

  document.getElementById('date').textContent =
    `${DAYS_FULL[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}

buildClock();
updateClock();
setInterval(updateClock, 1000);

/* ───────────── WEATHER ───────────── */
async function loadWeather() {
  try {
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=-26.2041&longitude=28.0473' +
      '&current=temperature_2m' +
      '&daily=temperature_2m_max' +
      '&timezone=Africa/Johannesburg'
    );
    const data = await res.json();

    document.getElementById('temp').textContent =
      Math.round(data.current.temperature_2m) + '°C';
    document.getElementById('desc').textContent = 'Today';

    const week = document.getElementById('week');
    week.innerHTML = '';

    data.daily.time.slice(1).forEach((day, i) => {
      const date = new Date(day);
      const div = document.createElement('div');
      div.className = 'day';
      div.innerHTML =
        `${DAYS_SHORT[date.getDay()]}<strong>${Math.round(data.daily.temperature_2m_max[i + 1])}°</strong>`;
      week.appendChild(div);
    });

  } catch {
    document.getElementById('desc').textContent = 'Weather unavailable';
  }
}

loadWeather();
setInterval(loadWeather, 15 * 60 * 1000);

/* ───────────── CALENDAR ───────────── */
function buildCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();

  DAYS_SHORT.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dow';
    el.textContent = d;
    cal.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement('div'));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.textContent = d;
    if (d === today) el.className = 'today';
    cal.appendChild(el);
  }
}

buildCalendar();
</script>

</body>
</html>
