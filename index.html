<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      color: #e8eaf6;
      font-family: Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }

    .app {
      position: absolute;
      top: 15px;
      right: 15px;
      bottom: 15px;
      left: 15px;
    }

    /* ── CLOCK ── */
    .clock-container {
      height: 230px;
      padding-top: 8px;
    }

    .time-row {
      display: inline-block;
    }

    .time-part {
      display: inline-block;
      background: #12172b;
      border: 1px solid #2a3058;
      border-radius: 14px;
      padding: 16px 18px;
      margin: 0 5px;
      min-width: 110px;
      font-size: 88px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #c8d8ff;
      position: relative;
      -webkit-box-shadow: 0 0 28px rgba(100,140,255,0.25), 0 8px 20px rgba(0,0,0,0.7);
      box-shadow: 0 0 28px rgba(100,140,255,0.25), 0 8px 20px rgba(0,0,0,0.7);
      line-height: 1;
    }

    .time-part::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 5%;
      width: 90%;
      height: 1px;
      background: rgba(42,48,88,0.9);
      margin-top: -1px;
    }

    .time-sep {
      display: inline-block;
      font-size: 64px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      vertical-align: top;
      margin-top: 18px;
      color: #3a4580;
      line-height: 1;
      -webkit-animation: blink 1s step-end infinite;
      animation: blink 1s step-end infinite;
    }

    .sec-part {
      display: inline-block;
      font-size: 34px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      vertical-align: bottom;
      margin-bottom: 18px;
      margin-left: 8px;
      color: #4a5590;
      line-height: 1;
    }

    @-webkit-keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .date {
      font-size: 18px;
      color: #6878b0;
      margin-top: 14px;
      letter-spacing: 1.5px;
    }

    /* ── WEATHER STRIP ── */
    .weather-strip {
      margin-top: 12px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      gap: 0;
    }

    .wx-icon {
      font-size: 28px;
      margin-right: 8px;
      line-height: 1;
    }

    .wx-temp {
      font-size: 28px;
      font-weight: bold;
      color: #c8d8ff;
      margin-right: 10px;
    }

    .wx-desc {
      font-size: 14px;
      color: #6878b0;
      letter-spacing: 0.5px;
    }

    /* ── BOTTOM PANEL ── */
    .panel {
      position: absolute;
      top: 310px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 4px;
    }

    .card-inner {
      height: 100%;
      background: #0e1223;
      border: 1px solid #1e2448;
      border-radius: 16px;
      padding: 16px;
      overflow: hidden;
      text-align: left;
      -webkit-box-shadow: inset 0 1px 0 rgba(100,140,255,0.08), 0 4px 24px rgba(0,0,0,0.5);
      box-shadow: inset 0 1px 0 rgba(100,140,255,0.08), 0 4px 24px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 13px;
      color: #4a5590;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    /* ── CALENDAR ── */
    .cal {
      font-size: 0;
    }

    .cal div {
      display: inline-block;
      width: 14.285%;
      text-align: center;
      font-size: 15px;
      padding: 9px 0;
      color: #9aa4d8;
      vertical-align: top;
      border-radius: 8px;
    }

    .cal-header div {
      color: #3a4570;
      font-size: 11px;
      padding-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .today {
      background: linear-gradient(135deg, #3a6fff, #6a4fff);
      color: #fff !important;
      font-weight: bold;
      -webkit-box-shadow: 0 0 12px rgba(80,120,255,0.5);
      box-shadow: 0 0 12px rgba(80,120,255,0.5);
    }

    .empty {
      visibility: hidden;
    }

    /* ── RESPONSIVE ── */
    @media screen and (max-width: 900px) {
      .clock-container { height: 200px; }
      .time-part { min-width: 90px; font-size: 70px; padding: 13px 14px; }
      .time-sep { font-size: 50px; margin-top: 15px; }
      .sec-part { font-size: 26px; margin-bottom: 14px; }
      .date { font-size: 15px; }
      .wx-temp { font-size: 22px; }
      .wx-icon { font-size: 22px; }
      .panel { top: 278px; }
    }

    @media screen and (max-width: 600px) {
      .app { top: 10px; right: 10px; bottom: 10px; left: 10px; }
      .clock-container { height: 165px; }
      .time-part { min-width: 70px; font-size: 54px; padding: 11px 10px; margin: 0 3px; }
      .time-sep { font-size: 38px; margin-top: 12px; }
      .sec-part { font-size: 20px; margin-bottom: 10px; }
      .date { font-size: 12px; margin-top: 10px; }
      .wx-temp { font-size: 18px; }
      .wx-icon { font-size: 18px; }
      .wx-desc { font-size: 12px; }
      .panel { top: 238px; padding: 0 2px; }
      .title { font-size: 11px; margin-bottom: 8px; }
      .cal div { font-size: 12px; padding: 7px 0; }
      .cal-header div { font-size: 9px; }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="clock-container">
      <div class="time-row">
        <div class="time-part" id="hours">--</div>
        <div class="time-sep">:</div>
        <div class="time-part" id="minutes">--</div>
        <div class="sec-part" id="seconds">00</div>
      </div>
      <div id="date" class="date">Loading&hellip;</div>

      <div class="weather-strip" id="weather-strip">
        <span class="wx-icon" id="wx-icon">&#9729;</span>
        <span class="wx-temp" id="wx-temp">&ndash;&ndash;&deg;C</span>
        <span class="wx-desc" id="wx-desc">Fetching weather&hellip;</span>
      </div>
    </div>

    <div class="panel">
      <div class="card-inner">
        <div id="month" class="title">Calendar</div>
        <div class="cal cal-header">
          <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
        </div>
        <div id="calendar" class="cal"></div>
      </div>
    </div>

  </div>

  <script>
    /* ── helpers ── */
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    /* ── clock ── */
    function updateClock() {
      var n = new Date();
      document.getElementById('hours').textContent   = pad(n.getHours());
      document.getElementById('minutes').textContent = pad(n.getMinutes());
      document.getElementById('seconds').textContent = pad(n.getSeconds());

      var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      document.getElementById('date').textContent =
        days[n.getDay()] + ', ' + n.getDate() + ' ' + months[n.getMonth()] + ' ' + n.getFullYear();
    }

    /* ── calendar ── */
    function buildCalendar() {
      var n = new Date();
      var y = n.getFullYear();
      var m = n.getMonth();
      var d = n.getDate();
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      document.getElementById('month').textContent = months[m] + ' ' + y;
      var cal = document.getElementById('calendar');
      cal.innerHTML = '';
      var firstDay    = new Date(y, m, 1).getDay();
      var daysInMonth = new Date(y, m + 1, 0).getDate();
      var i, div;
      for (i = 0; i < firstDay; i++) {
        div = document.createElement('div');
        div.className = 'empty';
        div.textContent = '.';
        cal.appendChild(div);
      }
      for (i = 1; i <= daysInMonth; i++) {
        div = document.createElement('div');
        if (i === d) { div.className = 'today'; }
        div.textContent = i;
        cal.appendChild(div);
      }
    }

    /* ── weather ── */
    /* WMO weather-code → emoji + label */
    var WX_MAP = [
      [0,   '&#9728;',  'Clear sky'],
      [1,   '&#127780;','Mainly clear'],
      [2,   '&#9925;',  'Partly cloudy'],
      [3,   '&#9729;',  'Overcast'],
      [45,  '&#127787;','Fog'],
      [48,  '&#127787;','Icy fog'],
      [51,  '&#127746;','Light drizzle'],
      [53,  '&#127746;','Drizzle'],
      [55,  '&#127746;','Heavy drizzle'],
      [61,  '&#127783;','Light rain'],
      [63,  '&#127783;','Rain'],
      [65,  '&#127783;','Heavy rain'],
      [71,  '&#10052;', 'Light snow'],
      [73,  '&#10052;', 'Snow'],
      [75,  '&#10052;', 'Heavy snow'],
      [80,  '&#127783;','Rain showers'],
      [85,  '&#10052;', 'Snow showers'],
      [95,  '&#9928;',  'Thunderstorm'],
      [99,  '&#9928;',  'Thunderstorm']
    ];

    function wxLookup(code) {
      var result = { icon: '&#127760;', desc: 'Weather' };
      var i;
      for (i = 0; i < WX_MAP.length; i++) {
        if (WX_MAP[i][0] <= code) {
          result.icon = WX_MAP[i][1];
          result.desc = WX_MAP[i][2];
        }
      }
      return result;
    }

    function setWeather(temp, code) {
      var wx = wxLookup(code);
      document.getElementById('wx-icon').innerHTML  = wx.icon;
      document.getElementById('wx-temp').textContent = Math.round(temp) + '\u00b0C';
      document.getElementById('wx-desc').textContent = wx.desc;
    }

    function fetchWeatherForCoords(lat, lon) {
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat +
                '&longitude=' + lon +
                '&current_weather=true&temperature_unit=celsius';
      /* XHR — no fetch() to keep iOS 9 compat */
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              setWeather(data.current_weather.temperature,
                         data.current_weather.weathercode);
            } catch (e) {
              document.getElementById('wx-desc').textContent = 'Weather unavailable';
            }
          } else {
            document.getElementById('wx-desc').textContent = 'Weather unavailable';
          }
        }
      };
      xhr.send();
    }

    function initWeather() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            fetchWeatherForCoords(
              pos.coords.latitude,
              pos.coords.longitude
            );
          },
          function() {
            /* Denied or unavailable — fall back to a neutral default */
            document.getElementById('wx-icon').innerHTML = '&#9729;';
            document.getElementById('wx-temp').textContent = '--\u00b0C';
            document.getElementById('wx-desc').textContent = 'Location unavailable';
          },
          { timeout: 8000 }
        );
      } else {
        document.getElementById('wx-desc').textContent = 'Geolocation not supported';
      }
    }

    /* ── boot ── */
    updateClock();
    buildCalendar();
    initWeather();

    setInterval(updateClock, 1000);
  </script>
</body>
</html>
